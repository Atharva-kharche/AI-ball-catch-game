<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATHARVA AI BALL CATCH</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-blue: #0078ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff3366;
            --neon-green: #00ffaa;
            --neon-yellow: #ffe664;
            --glass-bg: rgba(10, 15, 30, 0.4);
            --glass-border: rgba(0, 243, 255, 0.15);
            --hud-text: rgba(200, 220, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: #020205;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            aspect-ratio: 16/9;
            box-shadow: 0 0 80px rgba(0, 120, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 10;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }

        video { 
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -10;
        }

        /* HUD & UI - AAA Glassmorphism */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .glass-panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Branding */
        #brand-top {
            top: 20px; left: 20px;
            border-left: 4px solid var(--neon-cyan);
        }
        #brand-top .title { font-weight: 800; font-size: 14px; letter-spacing: 2px; color: var(--neon-cyan); text-transform: uppercase; text-shadow: 0 0 10px var(--neon-cyan); }
        #brand-top .subtitle { font-size: 11px; color: var(--hud-text); letter-spacing: 1px; }

        #brand-bottom {
            bottom: 20px; right: 20px;
            border-right: 4px solid var(--neon-purple);
            text-align: right;
        }
        #brand-bottom .title { font-weight: 700; font-size: 13px; letter-spacing: 1.5px; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        /* Stats HUD */
        #hud-stats {
            top: 20px; right: 20px;
            border-right: 4px solid var(--neon-blue);
            min-width: 160px;
        }
        .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; letter-spacing: 1px; color: var(--hud-text); }
        .stat-val { font-family: monospace; font-size: 14px; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .val-good { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .val-warn { color: var(--neon-yellow); text-shadow: 0 0 8px var(--neon-yellow); }
        .val-err  { color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); }

        /* Screens */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 12, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 30;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Loader */
        .loader-ring {
            width: 80px; height: 80px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-cyan);
            border-right: 3px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin-pulse 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.2), 0 0 20px rgba(188, 19, 254, 0.2);
        }
        
        #loading-text { font-size: 1.2rem; font-weight: 700; letter-spacing: 4px; color: var(--neon-cyan); text-transform: uppercase; text-shadow: 0 0 15px var(--neon-cyan); margin-bottom: 10px; }
        #loading-subtext { font-size: 0.9rem; color: var(--hud-text); letter-spacing: 2px; }

        .error-msg { color: var(--neon-red) !important; text-shadow: 0 0 15px var(--neon-red) !important; }

        /* Screen Flash / Vignette */
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 150%);
            z-index: 15; pointer-events: none;
        }
        #screen-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; opacity: 0; z-index: 18; pointer-events: none;
            transition: opacity 0.1s ease-out;
        }

        @keyframes spin-pulse {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-panel { padding: 8px 12px; }
            #brand-top .title { font-size: 11px; }
            #brand-bottom .title { font-size: 11px; }
            .stat-row { font-size: 10px; }
            .stat-val { font-size: 12px; }
            .loader-ring { width: 50px; height: 50px; }
            #loading-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div id="vignette"></div>
        <div id="screen-flash"></div>

        <!-- HUD UI Layer -->
        <div class="ui-layer">
            <div id="brand-top" class="glass-panel">
                <div class="title">Made by Atharva</div>
                <div class="subtitle">AI VISION ENGINE</div>
            </div>

            <div id="hud-stats" class="glass-panel">
                <div class="stat-row"><span>FPS</span><span id="hud-fps" class="stat-val">0</span></div>
                <div class="stat-row"><span>TRACKING</span><span id="hud-track" class="stat-val val-warn">INIT</span></div>
                <div class="stat-row"><span>SPEED</span><span id="hud-speed" class="stat-val">1.0x</span></div>
                <div class="stat-row"><span>BEST</span><span id="hud-best" class="stat-val" style="color:var(--neon-yellow)">0</span></div>
            </div>

            <div id="brand-bottom" class="glass-panel">
                <div class="title">@futurewithatharva</div>
            </div>
        </div>

        <!-- Screens -->
        <div id="loading-screen" class="overlay-screen">
            <div class="loader-ring"></div>
            <div id="loading-text">INITIALIZING ENGINE</div>
            <div id="loading-subtext">Loading Neural Models (0%)</div>
        </div>
    </div>

    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        /* =====================================================================
           MODULE: UTILS & CONSTANTS
           ===================================================================== */
        const C = {
            W: 1280, H: 720,
            PADDLE_W: 240, PADDLE_H: 16, PADDLE_Y: 720 - 90, // TWEAKED: Wider paddle
            BALL_R: 18, BALL_SPEED_0: 12, SPEED_INC: 0.3, MAX_SPEED: 35, // TWEAKED: Slower start & easier curve
            COLORS: {
                paddle: '#00f3ff', ball: '#00ffaa', trail: '#288c5a',
                score: '#ffe664', dead: '#ff3366', glass: 'rgba(5, 8, 15, 0.65)'
            },
            EMA_ALPHA: 0.4, 
            MAX_PARTICLES: 150,
            MAX_TRAILS: 30
        };

        const Utils = {
            lerp: (a, b, t) => a + (b - a) * t,
            clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
            hexToRgb: (hex) => {
                let bigint = parseInt(hex.replace('#', ''), 16);
                return `${(bigint >> 16) & 255}, ${(bigint >> 8) & 255}, ${bigint & 255}`;
            },
            formatNum: (n) => n.toString().padStart(2, '0')
        };

        /* =====================================================================
           MODULE: OBJECT POOLS (Performance Optimization to prevent GC)
           ===================================================================== */
        class Particle {
            constructor() { this.active = false; }
            spawn(x, y, colorRGB) {
                this.x = x; this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 5;
                this.color = colorRGB;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
                this.r = Math.random() * 5 + 2;
                this.active = true;
            }
            update() {
                if (!this.active) return false;
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.4; 
                this.vx *= 0.98; 
                this.life -= this.decay;
                if (this.life <= 0) this.active = false;
                return this.active;
            }
            draw(ctx) {
                if (!this.active) return;
                ctx.globalAlpha = this.life;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${this.color}, 1)`;
                ctx.fill();
            }
        }

        class TrailNode {
            constructor() { this.active = false; }
            spawn(x, y) { this.x = x; this.y = y; this.alpha = 1.0; this.active = true; }
            update() {
                if (!this.active) return;
                this.alpha -= 0.08;
                if (this.alpha <= 0) this.active = false;
            }
        }

        class ObjectPool {
            constructor(ClassType, size) {
                this.pool = Array.from({ length: size }, () => new ClassType());
                this.idx = 0;
            }
            get() {
                for (let i = 0; i < this.pool.length; i++) {
                    const item = this.pool[(this.idx + i) % this.pool.length];
                    if (!item.active) {
                        this.idx = (this.idx + i + 1) % this.pool.length;
                        return item;
                    }
                }
                const item = this.pool[this.idx];
                this.idx = (this.idx + 1) % this.pool.length;
                return item;
            }
            updateAll(ctx, drawFunc = false) {
                for (let i = 0; i < this.pool.length; i++) {
                    if (this.pool[i].active) {
                        this.pool[i].update();
                        if (drawFunc) this.pool[i].draw(ctx);
                    }
                }
            }
        }

        /* =====================================================================
           MODULE: GRAPHICS & RENDERER (Canvas optimizations)
           ===================================================================== */
        class Renderer {
            constructor(canvasId, videoId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d', { alpha: false, desynchronized: true });
                this.video = document.getElementById(videoId);
                this.flashEl = document.getElementById('screen-flash');
                
                this.cBallRGB = Utils.hexToRgb(C.COLORS.ball);
                this.cDeadRGB = Utils.hexToRgb(C.COLORS.dead);
                this.cTrailRGB = Utils.hexToRgb(C.COLORS.trail);
                this.cPaddleRGB = Utils.hexToRgb(C.COLORS.paddle);

                this.assets = {
                    ball: this.createGlowAsset(C.BALL_R, C.COLORS.ball),
                    paddle: this.createPaddleAsset(C.PADDLE_W, C.PADDLE_H, C.COLORS.paddle)
                };
            }

            createGlowAsset(r, color) {
                const c = document.createElement('canvas');
                const pad = 40; c.width = r*2 + pad*2; c.height = r*2 + pad*2;
                const ctx = c.getContext('2d');
                const cx = c.width/2, cy = c.height/2;
                
                ctx.shadowBlur = 25; ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                
                ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(cx - r*0.3, cy - r*0.3, r*0.4, 0, Math.PI*2); ctx.fill();
                return { img: c, offset: pad };
            }

            createPaddleAsset(w, h, color) {
                const c = document.createElement('canvas');
                const pad = 30; c.width = w + pad*2; c.height = h + pad*2;
                const ctx = c.getContext('2d');
                
                ctx.shadowBlur = 20; ctx.shadowColor = color; ctx.fillStyle = color;
                ctx.beginPath(); ctx.roundRect(pad, pad, w, h, h/2); ctx.fill();
                
                ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath(); ctx.roundRect(pad + h/2, pad + 2, w - h, h*0.4, h/4); ctx.fill();
                return { img: c, offset: pad };
            }

            triggerFlash(color = '#fff', duration = 0.1) {
                this.flashEl.style.transition = 'none';
                this.flashEl.style.backgroundColor = color;
                this.flashEl.style.opacity = '0.7';
                setTimeout(() => {
                    this.flashEl.style.transition = `opacity ${duration}s ease-out`;
                    this.flashEl.style.opacity = '0';
                }, 10);
            }
        }

        /* =====================================================================
           MODULE: GAME ENGINE
           ===================================================================== */
        class GameEngine {
            constructor() {
                this.r = new Renderer('gameCanvas', 'webcam');
                this.particles = new ObjectPool(Particle, C.MAX_PARTICLES);
                this.trails = new ObjectPool(TrailNode, C.MAX_TRAILS);
                
                this.state = 'waiting'; 
                this.stateTimer = 0; 
                this.score = 0;
                this.bestScore = localStorage.getItem('ab_best') || 0;
                
                this.px = C.W/2 - C.PADDLE_W/2; 
                this.pTarget = this.px;
                this.bx = 0; this.by = 0; this.bvx = 0; this.bvy = 0; 
                this.speed = C.BALL_SPEED_0;
                this.shake = 0;
                this.slowmoTimer = 0;

                this.finger = { x: C.W/2, y: C.H/2, active: false, rawX: C.W/2 };

                this.dom = {
                    fps: document.getElementById('hud-fps'),
                    track: document.getElementById('hud-track'),
                    speed: document.getElementById('hud-speed'),
                    best: document.getElementById('hud-best')
                };
                this.dom.best.innerText = Utils.formatNum(this.bestScore);

                this.lastTime = performance.now();
                this.frameCount = 0; this.fpsTimer = 0;

                this.bindEvents();
                this.reset();
            }

            bindEvents() {
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && (this.state === 'dead' || this.state === 'waiting')) {
                        this.start();
                    }
                });
                this.r.canvas.addEventListener('pointermove', (e) => {
                    if (!this.finger.active) {
                        const rect = this.r.canvas.getBoundingClientRect();
                        const scaleX = C.W / rect.width;
                        const scaleY = C.H / rect.height;
                        this.finger.rawX = (e.clientX - rect.left) * scaleX;
                        this.finger.y = (e.clientY - rect.top) * scaleY;
                    }
                });
                this.r.canvas.addEventListener('pointerdown', () => {
                    if (this.state !== 'playing') this.start();
                });
            }

            reset() {
                this.score = 0;
                this.stateTimer = 0; 
                this.bx = C.W / 2; this.by = C.H / 3;
                this.speed = C.BALL_SPEED_0;
                
                const angle = Utils.lerp(Math.PI * 0.3, Math.PI * 0.7, Math.random());
                const dir = Math.random() > 0.5 ? 1 : -1;
                this.bvx = Math.cos(angle) * this.speed * dir;
                this.bvy = Math.sin(angle) * this.speed;
                
                this.shake = 0;
                this.slowmoTimer = 0;
                for(let p of this.particles.pool) p.active = false;
                for(let t of this.trails.pool) t.active = false;
            }

            start() {
                this.reset();
                this.state = 'playing';
            }

            updateInput(rawX, rawY, isActive) {
                this.finger.active = isActive;
                
                if (isActive) {
                    this.finger.rawX = rawX;
                    this.finger.y = rawY; 
                    
                    if (this.state === 'waiting') {
                        this.start();
                    } else if (this.state === 'dead' && this.stateTimer > 1.5) {
                        this.start();
                    }
                }
                
                if (isActive && this.dom.track.innerText !== 'LOCKED') {
                    this.dom.track.innerText = 'LOCKED';
                    this.dom.track.className = 'stat-val val-good';
                } else if (!isActive && this.dom.track.innerText !== 'LOST') {
                    this.dom.track.innerText = 'LOST';
                    this.dom.track.className = 'stat-val val-err';
                }
            }

            spawnSparks(x, y, count, colorRGB) {
                for (let i = 0; i < count; i++) {
                    this.particles.get().spawn(x, y, colorRGB);
                }
            }

            updatePhysics(dt) {
                let dtMod = 1.0;
                if (this.slowmoTimer > 0) {
                    dtMod = 0.3; 
                    this.slowmoTimer -= dt;
                }

                this.pTarget = this.finger.rawX - C.PADDLE_W / 2;
                this.pTarget = Utils.clamp(this.pTarget, 0, C.W - C.PADDLE_W);
                // TWEAKED: Increased lerp to 0.6 so the paddle tracks your hand much faster
                this.px = Utils.lerp(this.px, this.pTarget, 0.6);

                if (this.state === 'dead') {
                    this.stateTimer += dt / 1000;
                }

                if (this.state !== 'playing') return;

                this.bx += this.bvx * dtMod;
                this.by += this.bvy * dtMod;

                if (this.frameCount % 2 === 0) this.trails.get().spawn(this.bx, this.by);

                if (this.bx - C.BALL_R <= 0) { this.bx = C.BALL_R; this.bvx *= -1; this.shake = 2; }
                else if (this.bx + C.BALL_R >= C.W) { this.bx = C.W - C.BALL_R; this.bvx *= -1; this.shake = 2; }
                if (this.by - C.BALL_R <= 0) { this.by = C.BALL_R; this.bvy *= -1; this.shake = 2; }

                const ballB = this.by + C.BALL_R;
                if (ballB >= C.PADDLE_Y - 4 && ballB <= C.PADDLE_Y + C.PADDLE_H + 4 && this.bvy > 0) {
                    if (this.bx >= this.px - C.BALL_R && this.bx <= this.px + C.PADDLE_W + C.BALL_R) {
                        
                        const hitFactor = (this.bx - (this.px + C.PADDLE_W/2)) / (C.PADDLE_W/2);
                        this.bvy *= -1;
                        this.bvx += hitFactor * 4;
                        
                        this.score++;
                        this.speed = Math.min(C.MAX_SPEED, C.BALL_SPEED_0 + this.score * C.SPEED_INC);
                        
                        const mag = Math.hypot(this.bvx, this.bvy);
                        this.bvx = (this.bvx / mag) * this.speed;
                        this.bvy = (this.bvy / mag) * this.speed;
                        this.by = C.PADDLE_Y - C.BALL_R - 1;

                        this.shake = Math.min(15, 5 + this.score * 0.5);
                        this.r.triggerFlash('rgba(0, 243, 255, 0.3)', 0.15);
                        this.spawnSparks(this.bx, this.by, 25 + Math.min(20, this.score), this.r.cBallRGB);
                        
                        if (this.score % 10 === 0 && this.score > 0) {
                            this.slowmoTimer = 500; 
                            this.r.triggerFlash('#fff', 0.4);
                        }

                        this.dom.speed.innerText = (this.speed / C.BALL_SPEED_0).toFixed(1) + 'x';
                    }
                }

                if (this.by - C.BALL_R > C.H + 50) {
                    this.state = 'dead';
                    this.stateTimer = 0; 
                    this.shake = 25;
                    this.r.triggerFlash(C.COLORS.dead, 0.5);
                    this.spawnSparks(C.W/2, C.H/2, 60, this.r.cDeadRGB);
                    
                    if (this.score > this.bestScore) {
                        this.bestScore = this.score;
                        localStorage.setItem('ab_best', this.bestScore);
                        this.dom.best.innerText = Utils.formatNum(this.bestScore);
                        this.dom.best.classList.add('val-good');
                        setTimeout(()=> this.dom.best.classList.remove('val-good'), 2000);
                    }
                }
            }

            render(time) {
                const ctx = this.r.ctx;
                const ox = this.shake > 0 ? (Math.random() - 0.5) * this.shake : 0;
                const oy = this.shake > 0 ? (Math.random() - 0.5) * this.shake : 0;

                ctx.save();
                ctx.translate(ox, oy);

                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(this.r.video, -C.W, 0, C.W, C.H);
                ctx.restore();
                
                ctx.fillStyle = C.COLORS.glass;
                ctx.fillRect(0, 0, C.W, C.H);

                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = `rgba(${this.r.cTrailRGB}, 1)`;
                for (let t of this.trails.pool) {
                    if (t.active) {
                        ctx.globalAlpha = t.alpha * 0.6;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, Math.max(2, C.BALL_R * 0.4 * t.alpha), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.globalCompositeOperation = 'source-over';

                this.particles.updateAll(ctx, true);
                ctx.globalAlpha = 1.0;

                const dangerAlpha = 0.2 + 0.15 * Math.abs(Math.sin(time * 0.005));
                ctx.globalAlpha = dangerAlpha;
                ctx.beginPath(); ctx.moveTo(0, C.PADDLE_Y + C.PADDLE_H + 25); ctx.lineTo(C.W, C.PADDLE_Y + C.PADDLE_H + 25);
                ctx.strokeStyle = C.COLORS.dead; ctx.lineWidth = 4; ctx.stroke();
                ctx.globalAlpha = 1.0;

                ctx.drawImage(this.r.assets.paddle.img, this.px - this.r.assets.paddle.offset, C.PADDLE_Y - this.r.assets.paddle.offset);

                if (this.state !== 'dead') {
                    ctx.drawImage(this.r.assets.ball.img, this.bx - C.BALL_R - this.r.assets.ball.offset, this.by - C.BALL_R - this.r.assets.ball.offset);
                }

                if (this.finger.active) {
                    ctx.beginPath(); ctx.arc(this.finger.rawX, this.finger.y, 12, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(this.finger.rawX, this.finger.y, 4, 0, Math.PI*2);
                    ctx.fillStyle = '#fff'; ctx.fill();
                }

                ctx.restore(); 

                this.renderUI(ctx, time);
            }

            renderUI(ctx, time) {
                const pulse = Math.abs(Math.sin(time * 0.003));

                if (this.state === 'playing') {
                    ctx.font = "900 120px 'Segoe UI'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillStyle = `rgba(255, 230, 100, ${0.1 + Math.min(this.score*0.01, 0.3)})`;
                    ctx.fillText(Utils.formatNum(this.score), C.W/2, C.H/2);
                }

                if (this.state === 'waiting') {
                    ctx.fillStyle = 'rgba(2, 2, 5, 0.7)'; ctx.fillRect(0, 0, C.W, C.H);
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    
                    ctx.font = "900 100px 'Segoe UI'";
                    ctx.shadowBlur = 20 + pulse * 15; ctx.shadowColor = C.COLORS.paddle;
                    ctx.fillStyle = '#fff'; ctx.fillText("BALL CATCH", C.W/2, C.H/2 - 60);
                    
                    ctx.shadowBlur = 0; ctx.font = "600 24px 'Segoe UI'"; ctx.fillStyle = "rgba(200, 220, 255, 1)";
                    ctx.fillText("RAISE HAND & POINT INDEX FINGER TO START", C.W/2, C.H/2 + 40);
                    
                    ctx.font = "400 16px 'Segoe UI'"; ctx.fillStyle = `rgba(150, 180, 255, ${0.5 + pulse*0.5})`;
                    ctx.fillText("[ Keep the ball in the air ]", C.W/2, C.H/2 + 80);
                } 
                else if (this.state === 'dead') {
                    ctx.fillStyle = 'rgba(20, 0, 5, 0.8)'; ctx.fillRect(0, 0, C.W, C.H);
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    
                    ctx.font = "900 100px 'Segoe UI'";
                    ctx.shadowBlur = 30; ctx.shadowColor = C.COLORS.dead;
                    ctx.fillStyle = `rgb(${180 + pulse * 75}, 50, 100)`;
                    ctx.fillText("SYSTEM FAILURE", C.W/2, C.H/2 - 80);
                    
                    ctx.shadowBlur = 0; ctx.font = "700 40px 'Segoe UI'"; ctx.fillStyle = C.COLORS.score;
                    ctx.fillText(`SCORE: ${Utils.formatNum(this.score)}`, C.W/2, C.H/2 + 10);

                    ctx.font = "600 20px 'Segoe UI'"; ctx.fillStyle = "rgba(150, 160, 200, 1)";
                    const cooldownReady = this.stateTimer > 1.5;
                    ctx.fillText(cooldownReady ? "SHOW HAND OR PRESS SPACE TO REBOOT" : "PROCESSING...", C.W/2, C.H/2 + 80);
                }
            }

            tick(time) {
                const dt = time - this.lastTime;
                this.lastTime = time;

                this.frameCount++; this.fpsTimer += dt;
                if (this.fpsTimer >= 1000) {
                    this.dom.fps.innerText = this.frameCount;
                    this.frameCount = 0; this.fpsTimer = 0;
                }

                this.updatePhysics(dt);
                
                this.trails.updateAll(null, false);
                if (this.shake > 0) this.shake = Math.max(0, this.shake - dt * 0.05);

                this.render(time);
            }
        }

        /* =====================================================================
           MODULE: APPLICATION BOOTSTRAP & AI VISION
           ===================================================================== */
        let gameInstance;
        let handLandmarker;
        let lastVideoTime = -1;

        function updateLoader(text, sub, isError = false) {
            const elTxt = document.getElementById('loading-text');
            const elSub = document.getElementById('loading-subtext');
            elTxt.innerText = text; elSub.innerText = sub;
            if (isError) {
                elTxt.classList.add('error-msg');
                document.querySelector('.loader-ring').style.animation = 'none';
                document.querySelector('.loader-ring').style.borderColor = 'var(--neon-red)';
            }
        }

        async function initApp() {
            try {
                updateLoader("INITIALIZING NEURAL NET", "Fetching WASM Models...");
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
                );
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1,
                    minHandDetectionConfidence: 0.6,
                    minHandPresenceConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                updateLoader("SECURING OPTICS", "Requesting Camera Access...");
                const video = document.getElementById('webcam');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                
                await new Promise((res) => { video.onloadedmetadata = () => { video.play(); res(); }; });

                updateLoader("SYSTEM READY", "Booting Engine...");
                const loadScreen = document.getElementById('loading-screen');
                loadScreen.style.opacity = '0';
                setTimeout(() => loadScreen.classList.add('hidden'), 600);

                gameInstance = new GameEngine();
                requestAnimationFrame(mainLoop);

            } catch (err) {
                console.error(err);
                updateLoader("FATAL ERROR", "Camera access denied or device unsupported. Reload and allow permissions.", true);
            }
        }

        function mainLoop(timestamp) {
            const video = gameInstance.r.video;
            
            if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    const lm = results.landmarks[0][8]; 
                    const rawX = (1 - lm.x) * C.W; 
                    const rawY = lm.y * C.H;
                    gameInstance.updateInput(rawX, rawY, true);
                } else {
                    gameInstance.updateInput(C.W/2, C.H/2, false);
                }
            }

            gameInstance.tick(timestamp);
            requestAnimationFrame(mainLoop);
        }

        window.addEventListener('DOMContentLoaded', initApp);

    </script>
